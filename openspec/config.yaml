schema: spec-driven

context: |
  Language: Always write all artifacts in Brazilian Portuguese (pt-BR).

  Project: wzap — plataforma de automação WhatsApp com API REST.

  Tech stack:
    - Go 1.25, Fiber v2 (HTTP), pgx v5 (PostgreSQL), NATS JetStream (broker), MinIO (S3 storage)
    - whatsmeow (WhatsApp engine), zerolog (logging), Prometheus (metrics)
    - Frontend: Nuxt 3 + Nuxt UI Pro (Vue 3)
    - Infra: Docker Compose (Postgres, MinIO, NATS)

  Architecture:
    - cmd/wzap/          → Entry point
    - internal/handler/  → HTTP controllers (Fiber)
    - internal/service/  → Business logic
    - internal/repo/     → Data-access layer (raw SQL, pgx)
    - internal/dto/      → Request/Response payloads + validation
    - internal/model/    → Domain objects
    - internal/middleware/→ Auth, Logger, Recovery, CORS, RateLimit
    - internal/wa/       → whatsmeow engine integration
    - internal/webhook/  → NATS consumer + WS broadcaster
    - internal/websocket/→ WebSocket hub
    - internal/provider/ → External API clients (WhatsApp Cloud API)
    - internal/integrations/ → Third-party (e.g. Chatwoot)
    - internal/metrics/  → Prometheus collectors
    - migrations/        → SQL migrations

  Conventions:
    - Dependency injection via constructors (New<Type>)
    - Error wrapping com fmt.Errorf("failed to ...: %w", err)
    - Nunca expor err.Error() de service/repo em respostas 500
    - Testes com testing.T padrão (sem testify), external test packages
    - Conventional Commits (feat, fix, chore, refactor, test, docs)

rules:
  proposal:
    - Manter propostas concisas, máximo 500 palavras
    - Sempre incluir seção "Não-objetivos" (o que NÃO será feito)
    - Incluir seção "Riscos e mitigações"
    - Referenciar pacotes/arquivos existentes quando relevante
  design:
    - Detalhar fluxo de dados entre camadas (handler → service → repo)
    - Especificar alterações no banco de dados (migrations) quando aplicável
    - Incluir diagramas de sequência para fluxos complexos
    - Considerar impacto em métricas Prometheus e webhooks
  specs:
    - Definir critérios de aceitação claros e verificáveis
    - Especificar DTOs (request/response) com tipos e validações
    - Incluir casos de erro e códigos HTTP esperados
    - Documentar endpoints com formato Swagger (@Summary, @Router, etc.)
  tasks:
    - Quebrar tarefas em chunks de no máximo 2 horas
    - Seguir a ordem: model → repo → service → handler → tests
    - Incluir tarefa de testes para cada componente
    - Incluir tarefa final de lint (golangci-lint) e testes (go test)
