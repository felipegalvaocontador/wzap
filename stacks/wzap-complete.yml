version: "3.7"

services:

## --------------------------- POSTGRESQL --------------------------- ##

  wzap_postgres:
    image: postgres:16-alpine

    volumes:
      - wzap_postgres_data:/var/lib/postgresql/data ## Dados do banco

    networks:
      - Gacont ## Nome da rede interna

    environment:
      ## Dados do Postgres
      - POSTGRES_DB=wzap
      - POSTGRES_USER=wzap
      - POSTGRES_PASSWORD=wzap123 ## Senha do postgres

      ## Timezone
      - TZ=America/Sao_Paulo

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wzap -d wzap"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

## --------------------------- NATS JETSTREAM --------------------------- ##

  wzap_nats:
    image: nats:2-alpine
    command:
      - "--http_port=8222"
      - "--js"
      - "--store_dir=/data"

    volumes:
      - wzap_nats_data:/data ## Dados do JetStream

    networks:
      - Gacont ## Nome da rede interna

    environment:
      ## Timezone
      - TZ=America/Sao_Paulo

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

## --------------------------- MINIO S3 STORAGE --------------------------- ##

  wzap_minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    command: server /data --console-address ":9001"

    volumes:
      - wzap_minio_data:/data ## Dados do S3

    networks:
      - Gacont ## Nome da rede interna

    environment:
      ## Credenciais MinIO
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=wzap@2024!Secure ## Senha do MinIO

      ## URLs públicas
      - MINIO_BROWSER_REDIRECT_URL=https://minio.wzap.gacont.com.br ## Console
      - MINIO_SERVER_URL=https://s3.wzap.gacont.com.br ## API S3

      ## Timezone
      - TZ=America/Sao_Paulo

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.docker.network=Gacont

        ## MinIO API (S3)
        - traefik.http.routers.wzap_minio_public.rule=Host(`s3.wzap.gacont.com.br`)
        - traefik.http.routers.wzap_minio_public.entrypoints=websecure
        - traefik.http.routers.wzap_minio_public.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wzap_minio_public.service=wzap_minio_public
        - traefik.http.services.wzap_minio_public.loadbalancer.server.port=9000
        - traefik.http.services.wzap_minio_public.loadbalancer.passHostHeader=true

        ## MinIO Console
        - traefik.http.routers.wzap_minio_console.rule=Host(`minio.wzap.gacont.com.br`)
        - traefik.http.routers.wzap_minio_console.entrypoints=websecure
        - traefik.http.routers.wzap_minio_console.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wzap_minio_console.service=wzap_minio_console
        - traefik.http.services.wzap_minio_console.loadbalancer.server.port=9001
        - traefik.http.services.wzap_minio_console.loadbalancer.passHostHeader=true

## --------------------------- WZAP API (BACKEND GO) --------------------------- ##

  wzap_api:
    image: felipyfgs17/wzap:api-latest

    networks:
      - Gacont ## Nome da rede interna

    environment:
      ## Dados do Postgres
      - DATABASE_URL=postgres://wzap:wzap123@wzap_postgres:5432/wzap?sslmode=disable

      ## Servidor
      - PORT=8080
      - SERVER_HOST=0.0.0.0
      - ADMIN_TOKEN=wzap_admin_token_change_me ## Token de autenticação admin
      - SERVER_URL=https://api.wzap.gacont.com.br ## URL pública da API

      ## Logging
      - LOG_LEVEL=info
      - ENVIRONMENT=production

      ## MinIO (S3)
      - MINIO_ENDPOINT=s3.wzap.gacont.com.br
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=wzap@2024!Secure ## Senha do MinIO
      - MINIO_BUCKET=wzap-media
      - MINIO_USE_SSL=true
      - MINIO_PUBLIC_URL=https://s3.wzap.gacont.com.br

      ## NATS
      - NATS_URL=nats://wzap_nats:4222

      ## Timezone
      - TZ=America/Sao_Paulo

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=Gacont
        - traefik.http.routers.wzap_api.rule=Host(`api.wzap.gacont.com.br`)
        - traefik.http.routers.wzap_api.entrypoints=websecure
        - traefik.http.routers.wzap_api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wzap_api.priority=1
        - traefik.http.routers.wzap_api.service=wzap_api
        - traefik.http.services.wzap_api.loadbalancer.server.port=8080
        - traefik.http.services.wzap_api.loadbalancer.passhostheader=true
        - traefik.http.middlewares.wzap_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.wzap_api.middlewares=wzap_sslheader@docker

## --------------------------- WZAP WEB (FRONTEND NUXT) --------------------------- ##

  wzap_web:
    image: felipyfgs17/wzap:web-latest

    networks:
      - Gacont ## Nome da rede interna

    environment:
      ## Servidor
      - HOST=0.0.0.0
      - PORT=3000

      ## Conexão com a API (rede interna Docker)
      - NUXT_API_URL=http://wzap_api:8080

      ## Timezone
      - TZ=America/Sao_Paulo

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.docker.network=Gacont
        - traefik.http.routers.wzap_web.rule=Host(`app.wzap.gacont.com.br`)
        - traefik.http.routers.wzap_web.entrypoints=websecure
        - traefik.http.routers.wzap_web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wzap_web.priority=1
        - traefik.http.routers.wzap_web.service=wzap_web
        - traefik.http.services.wzap_web.loadbalancer.server.port=3000
        - traefik.http.services.wzap_web.loadbalancer.passhostheader=true
        - traefik.http.middlewares.wzap_web_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.wzap_web.middlewares=wzap_web_sslheader@docker

## --------------------------- VOLUMES --------------------------- ##

volumes:
  wzap_postgres_data:
    driver: local
  wzap_nats_data:
    driver: local
  wzap_minio_data:
    driver: local

## --------------------------- NETWORKS --------------------------- ##

networks:
  Gacont: ## Nome da rede interna
    external: true
    name: Gacont ## Nome da rede interna
